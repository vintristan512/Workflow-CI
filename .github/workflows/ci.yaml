name: train

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge: false
          python-version: "3.10"   # sesuaikan jika perlu

      - name: Create conda env from file
        shell: bash -l {0}
        run: |
          conda env remove -n mlflow-env -y || true
          conda env create -f MLProject/conda.yaml -n mlflow-env
          conda activate mlflow-env
          python -V

      - name: Install mlflow (pip)
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          pip install mlflow

      - name: Run training (tuning reports only)
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          # sesuaikan nama script yang mau dijalankan:
          python MLProject/tuning_reports_only.py

      - name: Upload reports artefacts
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            MLProject/estimator.html
            MLProject/metric_info.json
            MLProject/training_confusion_matrix.png
